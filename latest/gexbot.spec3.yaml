    websocket_hub:
      type: string
      enum:
        - classic
        - state_gex
        - state_greeks_zero
        - state_greeks
        - state_greeks_one
        - orderflow
      description: Public WebSocket hub name. Standard state greeks use `state_greeks_zero`/`state_greeks_one`; explicit expiry greeks use `state_greeks`; explicit expiry orderflow uses `orderflow`.
    websocket_group_name:
      type: string
      example: SPX_state_gamma_zero
      description: |
        Unprefixed websocket group name in `{ticker}_{package}_{category}` format. Standard categories include `gex_full`, `gex_zero`, `gex_one`, `delta_zero`, `gamma_zero`, `vanna_zero`, `charm_zero`, `delta_one`, `gamma_one`, `vanna_one`, `charm_one`, and `orderflow`.

        Explicit-expiry groups use a `YYYYMMDD` category suffix discovered from `GET /v2/options/{ticker}/expiries`, for example `SPX_classic_gex_20260717`, `SPX_state_gex_20260717`, `SPX_state_gamma_20260717`, and `SPX_orderflow_20260717`.
    websocket_urls:
      type: object
      description: Map of hub name to signed WebSocket URL. Contains every hub authorized for the API key.
      properties:
        classic:
          type: string
          format: uri
          description: Connection URL for the Classic GEX hub.
        state_gex:
          type: string
          format: uri
          description: Connection URL for the State GEX Profile hub.
        state_greeks_zero:
          type: string
          format: uri
          description: Connection URL for the standard State Greeks 0DTE hub.
        state_greeks:
          type: string
          format: uri
          description: Connection URL for explicit-expiry State Greeks groups.
        state_greeks_one:
          type: string
          format: uri
          description: Connection URL for the State Greeks 1DTE+ hub.
        orderflow:
          type: string
          format: uri
          description: Connection URL for the Orderflow hub.
    websocket_negotiate_request:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/websocket_group_name"
          description: Complete initial set of groups to auto-join after connecting to the returned hub URLs.
      example:
        groups:
          - SPX_classic_gex_full
          - SPX_state_gamma_zero
          - ES_SPX_orderflow_orderflow
          - SOXL_state_gamma_20260717
    websocket_negotiate_response:
      type: object
      required:
        - websocket_urls
      properties:
        websocket_urls:
          $ref: "#/components/schemas/websocket_urls"
      example:
        websocket_urls:
          classic: wss://ws.gex.bot:443/client/hubs/classic?access_token=<access_token>
          state_gex: wss://ws.gex.bot:443/client/hubs/state_gex?access_token=<access_token>
          state_greeks_zero: wss://ws.gex.bot:443/client/hubs/state_greeks_zero?access_token=<access_token>
          state_greeks: wss://ws.gex.bot:443/client/hubs/state_greeks?access_token=<access_token>
          state_greeks_one: wss://ws.gex.bot:443/client/hubs/state_greeks_one?access_token=<access_token>
          orderflow: wss://ws.gex.bot:443/client/hubs/orderflow?access_token=<access_token>
    websocket_group_update_item:
      type: object
      required:
        - hub
        - group
      properties:
        hub:
          $ref: "#/components/schemas/websocket_hub"
        group:
          $ref: "#/components/schemas/websocket_group_name"
    websocket_group_update_request:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/websocket_group_update_item"
          description: Complete desired group set. Omitted groups are removed from active subscriptions.
      example:
        groups:
          - hub: classic
            group: SPX_classic_gex_full
          - hub: state_greeks_zero
            group: SPX_state_gamma_zero
          - hub: orderflow
            group: ES_SPX_orderflow_orderflow
          - hub: state_greeks
            group: SOXL_state_gamma_20260717
    websocket_group_update_response:
      type: object
      required:
        - updated_groups
        - hubs
      properties:
        updated_groups:
          type: integer
          format: int32
          description: Total number of active groups after replacement.
        hubs:
          type: object
          additionalProperties:
            type: integer
            format: int32
          description: Count of active groups by hub after replacement.
      example:
        updated_groups: 3
        hubs:
          classic: 1
          state_gex: 0
          state_greeks_zero: 1
          state_greeks: 1
          state_greeks_one: 0
          orderflow: 1
    websocket_legacy_negotiate_response:
      type: object
      required:
        - websocket_urls
        - prefix
      properties:
        websocket_urls:
          $ref: "#/components/schemas/websocket_urls"
        prefix:
          type: string
          description: Legacy prefix to prepend to group names when sending joinGroup messages.
      example:
        websocket_urls:
          classic: wss://ws.gex.bot:443/client/hubs/classic?access_token=<access_token>
          state_gex: wss://ws.gex.bot:443/client/hubs/state_gex?access_token=<access_token>
          state_greeks_zero: wss://ws.gex.bot:443/client/hubs/state_greeks_zero?access_token=<access_token>
