openapi: 3.0.1
info:
  title: NFA gexbot API
  description: NFA gexbot API
  version: 2.3.0
  termsOfService: "https://www.gexbot.com/terms-and-conditions"
servers:
  - url: https://api.gex.bot/v2
    description: Primary v2 API server
paths:
  /{ticker}/classic/{category}:
    get:
      summary: Get chart data for a ticker and category
      description: Returns chart data for the specified ticker and category. All parameters are strictly enumerated. Security is handled via API key or cookie.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/classic_category_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Chart data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/basic_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - Classic
        - State
        - Orderflow
        - Quant
  /{ticker}/state/{category}:
    get:
      summary: Get state data for a ticker and category
      description: Returns state data for the specified ticker and category. All parameters are strictly enumerated. Security is handled via API key or cookie.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/state_category_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Chart data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/basic_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - State
        - Orderflow
        - Quant
  /{ticker}/orderflow/{category}:
    get:
      summary: Get orderflow data for a ticker
      description: Returns orderflow data for the specified ticker. All parameters are strictly enumerated. Security is handled via API key or cookie.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/schemas/category_orderflow"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Orderflow data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/orderflow_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - Orderflow
        - Quant

  /{ticker}/classic/{category}/maxchange:
    get:
      summary: Get max change data for a ticker and category
      description: Returns the strikes with the most significant GEX change over various look-back periods for the specified ticker and category.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/classic_category_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Max change data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/maxchange_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - Classic
        - State
        - Orderflow
        - Quant
  /{ticker}/state/{category}/maxchange:
    get:
      summary: Get max change data for a ticker, package, and category
      description: Returns the strikes with the most significant GEX change over various look-back periods for the specified ticker, package, and category.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/state_category_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Max change data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/maxchange_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - State
        - Orderflow
        - Quant
  /{ticker}/classic/{category}/majors:
    get:
      summary: Get majors data for a ticker, package, and category
      description: Returns the key GEX levels (Zero Gamma, Major Positive/Negative GEX by OI and Volume) for the specified ticker, package, and category.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/classic_category_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Majors data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/majors_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - Classic
        - State
        - Orderflow
        - Quant
  /{ticker}/state/{category}/majors:
    get:
      summary: Get majors data for a ticker, package, and category
      description: Returns the key GEX levels (Zero Gamma, Major Positive/Negative GEX by OI and Volume) for the specified ticker, package, and category.
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/state_category_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        "200":
          description: Majors data response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/majors_response"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
      tags:
        - State
        - Orderflow
        - Quant
  /tickers:
    get:
      summary: List all available ticker symbols
      description: Returns the list of available ticker symbols supported by the API, including stocks, indexes, and futures.
      tags:
        - Public
      security: [ ]
      parameters:
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  stocks:
                    type: array
                    items:
                      type: string
                    description: Array of stock ticker symbols.
                  indexes:
                    type: array
                    items:
                      type: string
                    description: Array of index ticker symbols.
                  futures:
                    type: array
                    items:
                      type: string
                    description: Array of futures ticker symbols.
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
  /{package}/categories:
    servers:
      - url: https://api.gex.bot
        description: Primary API server for non-v2 routes
    get:
      summary: List data categories for a package
      description: Returns the available data category names for a package. Use these names when building REST requests or WebSocket groups.
      tags:
        - Public
      security: [ ]
      parameters:
        - $ref: "#/components/parameters/package_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        '200':
          description: Data category names for the requested package.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/data_category"
              example:
                - gex_full
                - gex_zero
                - gex_one
                - delta_zero
                - gamma_zero
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
  /tickers/quant:
    servers:
      - url: https://api.gex.bot
        description: Primary API server for non-v2 routes
    get:
      summary: List Quant ticker symbols
      description: |
        Returns additional stock and index ticker symbols available to Quant subscribers on the realtime WebSocket feed. These tickers are WebSocket/PubSub-only: they can publish standard realtime groups and explicit-expiry realtime groups, but are not REST chart/history endpoints.

        This route is served at `GET https://api.gex.bot/tickers/quant`.
      tags:
        - Quant
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        '200':
          description: Quant ticker symbols.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/quant_tickers_response"
              example:
                stocks:
                  - SOXL
                  - LLY
                  - FUTU
                indexes:
                  - XSP
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
  /options/{ticker}/expiries:
    get:
      summary: List all valid option expiries for realtime expiry groups
      description: |
        Returns all valid option expiration dates for a canonical option-owning ticker over the currently-published horizon: the current Eastern calendar date through current Eastern date + 90 calendar days.

        Use the returned `YYYY-MM-DD` dates to build explicit-expiry WebSocket group suffixes by removing dashes, e.g. `2026-07-17` becomes `20260717`. Use canonical option-owning tickers such as `SPX`, `NDX`, `SPY`, `QQQ`, Quant-only stock tickers, or the Quant-only `XSP` index.
      tags:
        - Quant
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/option_ticker_in_path"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        '200':
          description: All valid option expiries for the ticker within the published horizon.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/option_expiries_response"
              example:
                ticker: SPX
                start_date: "2026-07-10"
                end_date: "2026-10-08"
                expiries:
                  - "2026-07-10"
                  - "2026-07-13"
                  - "2026-07-15"
                  - "2026-07-17"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
  /hist/{ticker}/{package}/{category}/{date}:
    get:
      summary: Download historical data for a specific ticker, package, category, and date
      description: Generates a pre-signed URL to download historical data (JSON) for a specific date. Data is available for a 90-day look-back window. By default, this endpoint returns a 302 Redirect to the file. To receive a JSON response containing the URL instead, include the noredirect query parameter. To receive compressed data, set the Accept-Encoding header to gzip.
      tags:
        - Quant
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/ticker_in_path"
        - $ref: "#/components/parameters/package_in_path"
        - $ref: "#/components/parameters/category_in_path"
        - name: date
          in: path
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: The date to query in YYYY-MM-DD format.
        - name: noredirect
          in: query
          required: false
          schema:
            type: string
          description: Optional. If included, returns a JSON object with the URL instead of a 302 redirect.
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum: [ application/json ]
          description: Set to "application/json".
        - name: Accept-Encoding
          in: header
          required: false
          schema:
            type: string
            enum: [ gzip ]
          description: Optional. Set to "gzip" to receive compressed data.
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    description: The temporary, pre-signed URL to download the requested historical data file.
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
  /research/{ticker}/{metric}:
    get:
      summary: Get research chart data for a ticker and metric
      description: Returns research chart data for the specified ticker and metric. Supports various output formats, chart types, and filtering options.
      security:
        - bearer_auth: [ ]
      tags:
        - Research
      parameters:
        - $ref: "#/components/parameters/research_ticker_in_path"
        - name: metric
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/research_metric"
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - png
              - jpeg
              - svg
              - pdf
              - html
              - json
              - csv
              - plotly
              - webp
        - name: view
          in: query
          required: false
          schema:
            type: string
            enum:
              - skew
              - term
              - surface
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - line
              - histogram
              - scatter
              - bar
        - name: chart_type
          in: query
          required: false
          description: Rendering engine used to generate the chart.
          schema:
            type: string
            enum:
              - matplotlib
              - plotly
        - name: theme
          in: query
          required: false
          description: Chart color theme. Defaults to dark.
          schema:
            type: string
            default: dark
            enum:
              - light
              - dark
        - name: strikes
          in: query
          required: false
          schema:
            type: number
        - name: start_dte
          in: query
          required: false
          schema:
            type: number
        - name: end_dte
          in: query
          required: false
          schema:
            type: number
        - name: expiration_filter
          in: query
          required: false
          schema:
            type: string
        - name: contract_agg
          in: query
          required: false
          schema:
            type: boolean
        - name: expiry_agg
          in: query
          required: false
          schema:
            type: boolean
        - name: skew_adj
          in: query
          required: false
          schema:
            type: boolean
        - name: limit_y
          in: query
          required: false
          schema:
            type: boolean
        - name: contract_filter
          in: query
          required: false
          schema:
            type: string
            enum:
              - calls
              - puts
              - all
        - name: moneyness_filter
          in: query
          required: false
          schema:
            type: string
            enum:
              - atm
              - itm
              - ntm
              - otm
      responses:
        "200":
          description: Research chart data response
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

  /negotiate:
    post:
      summary: Negotiate WebSocket connection URLs and initial groups
      description: |
        Provides real-time, low-latency market data via WebSocket. Send the full initial set of unprefixed websocket group names in the request body. The response returns all hub URLs authorized for the API key, and requested groups are auto-joined on their matching hubs. Clients should connect to the returned hub URLs and should not call client-side joinGroup for this POST flow.

        Group names use `{ticker}_{package}_{category}`, for example `SPX_classic_gex_full`, `SPX_state_gamma_zero`, or `ES_SPX_orderflow_orderflow`. Explicit-expiry groups use a `YYYYMMDD` category suffix, for example `SOXL_classic_gex_20260717`, `SOXL_state_gamma_20260717`, or `SOXL_orderflow_20260717`. Use `GET /v2/options/{ticker}/expiries` to discover valid expiry dates. Standard Quant API keys are limited to 150 groups by default. Commercial or contracted API keys may have a higher custom group limit.
      tags:
        - Quant
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/websocket_negotiate_request"
            examples:
              groups:
                value:
                  groups:
                    - SPX_classic_gex_full
                    - SPX_state_gamma_zero
                    - ES_SPX_orderflow_orderflow
                    - SOXL_state_gamma_20260717
      responses:
        '200':
          description: WebSocket connection URLs for all authorized hubs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/websocket_negotiate_response"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
    patch:
      summary: Replace active WebSocket group subscriptions without reconnecting
      description: |
        Replaces the active group memberships for the current API websocket slot without issuing new WebSocket URLs. The request body is the complete desired set of active subscriptions. Any group omitted from the PATCH payload is removed server-side.

        Each group entry must include the hub the client is connected to and the unprefixed group name. The hub must match the group package/category, including explicit-expiry groups: expiry classic GEX uses `classic`, expiry state GEX uses `state_gex`, expiry state greeks use `state_greeks`, and expiry orderflow uses `orderflow`. The same group limits as POST negotiation apply. Standard Quant API keys are limited to 150 groups by default. Commercial or contracted API keys may have a higher custom group limit.
      tags:
        - Quant
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/websocket_group_update_request"
            examples:
              replace_groups:
                value:
                  groups:
                    - hub: classic
                      group: SPX_classic_gex_full
                    - hub: state_greeks_zero
                      group: SPX_state_gamma_zero
                    - hub: orderflow
                      group: ES_SPX_orderflow_orderflow
                    - hub: state_greeks
                      group: SOXL_state_gamma_20260717
      responses:
        '200':
          description: Active websocket group memberships replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/websocket_group_update_response"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
    get:
      summary: Legacy WebSocket negotiation with client-side group joins
      deprecated: true
      description: |
        Deprecated compatibility path. Returns connection URLs and a group prefix for legacy clients that manually send Azure Web PubSub joinGroup messages after connecting. New clients should use POST /negotiate and PATCH /negotiate instead.
      tags:
        - Quant
      security:
        - bearer_auth: [ ]
      parameters:
        - $ref: "#/components/parameters/user_agent_header"
        - $ref: "#/components/parameters/accept_header"
      responses:
        '200':
          description: Legacy WebSocket connection URLs and group prefix.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/websocket_legacy_negotiate_response"
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
components:
  schemas:
    _float:
      type: number
      format: float
    _double:
      type: number
      format: double
    _int:
      type: integer
    _int32:
      type: integer
      format: int32
    _int64:
      type: integer
      format: int32
    _string:
      type: string
    level:
      type: string
      enum:
        - ORDERFLOW
        - CLASSIC
        - STATE
    agg:
      enum:
        - day
    ticker:
      oneOf:
        - $ref: "#/components/schemas/ticker_stock"
        - $ref: "#/components/schemas/ticker_index"
        - $ref: "#/components/schemas/ticker_variant"
    option_ticker:
      oneOf:
        - $ref: "#/components/schemas/ticker_stock"
        - $ref: "#/components/schemas/ticker_index"
        - $ref: "#/components/schemas/quant_stock_ticker"
        - $ref: "#/components/schemas/quant_index_ticker"
      description: Canonical option-owning ticker, including standard and Quant-only stock/index tickers.
    quant_stock_ticker:
      type: string
      minLength: 1
      maxLength: 5
      enum:
        - SOXL
        - LLY
        - FUTU
        - MARA
        - PYPL
        - F
        - ETHA
        - EXK
        - HIMS
        - PINS
        - NKE
        - IREN
        - RIVN
        - IEF
        - MTCH
        - SBSW
        - RIOT
        - ONDS
        - CRM
        - PFE
        - TSLL
        - TGT
        - NXE
        - WMT
        - BMNR
        - CIFR
        - TTD
        - SMR
        - XLF
        - WULF
        - DRAM
        - BE
        - NBIS
        - OXY
        - XLE
        - GDX
        - SMH
        - JPM
        - BAC
        - WFC
        - C
        - GS
        - MS
        - SCHW
        - AXP
        - V
        - MA
        - CME
        - CBOE
        - NDAQ
      description: Additional Quant-only stock ticker available on the realtime WebSocket feed.
    quant_index_ticker:
      type: string
      minLength: 3
      maxLength: 3
      enum:
        - XSP
      description: Additional Quant-only index ticker available on the realtime WebSocket feed.
    quant_tickers_response:
      type: object
      required:
        - stocks
        - indexes
      properties:
        stocks:
          type: array
          items:
            $ref: "#/components/schemas/quant_stock_ticker"
          description: Additional Quant-only stock tickers available for realtime WebSocket output.
        indexes:
          type: array
          items:
            $ref: "#/components/schemas/quant_index_ticker"
          description: Additional Quant-only index tickers available for realtime WebSocket output.
    option_expiries_response:
      type: object
      required:
        - ticker
        - start_date
        - end_date
        - expiries
      properties:
        ticker:
          type: string
          description: Canonical ticker used for the expiry lookup.
        start_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: Start of the published expiry horizon in YYYY-MM-DD format.
        end_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: End of the published expiry horizon in YYYY-MM-DD format.
        expiries:
          type: array
          items:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: All valid option expiries in YYYY-MM-DD format within the published horizon.
    ticker_variant:
      type: string
      minLength: 4
      maxLength: 6
      enum:
        - ES_SPX
        - NDXP
        - NQ_NDX
        - RUTW
        - SPXW
        - VIXW
    ticker_index:
      type: string
      minLength: 3
      maxLength: 3
      enum:
        - NDX
        - RUT
        - SPX
        - VIX
    ticker_stock:
      type: string
      minLength: 2
      maxLength: 5
      enum:
        - AAPL
        - AMD
        - AMZN
        - APP
        - AVGO
        - BABA
        - BOIL
        - COIN
        - CRWD
